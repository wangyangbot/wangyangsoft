                powerInfoTextTip.textContent = power.tip;

                powerInfoText.appendChild(powerInfoTextTitle);
                powerInfoText.appendChild(powerInfoTextTip);

                const powerInfoArrow = document.createElement('div');
                powerInfoArrow.className = `toggle-btn ${power.showItem ? 'open' : ''}`;

                powerInfo.appendChild(powerInfoText);
                powerInfo.appendChild(powerInfoArrow);

                const powerItem = document.createElement('div');
                powerItem.className = `accordion-content ${power.showItem ? 'open' : ''}`;
                powerItem.onclick = function() { onClickArticle(index); };

                const articleRich = document.createElement('div');
                articleRich.className = `article content-${power.contentStyleType}`;
                articleRich.innerHTML = power.content;

                powerItem.appendChild(articleRich);
                powerDiv.appendChild(powerInfo);
                powerDiv.appendChild(powerItem);
                container.appendChild(powerDiv);
            });
        }

        // 点击软件信息展开/收起
        function onClickPowerInfo(index) {
            // 互斥展开：先把所有项收起，再展开当前项
            powerList.forEach((item, i) => {
                if (item.content) {
                    if (i === index) {
                        item.showItem = !item.showItem;
                    } else {
                        item.showItem = false;
                    }
                }
            });
            renderPowerList();
        }

        // 点击已展开的文章，收起并滚动到风琴项顶部
        function onClickArticle(index) {
            powerList[index].showItem = false;
            renderPowerList();
            // 收起动画完成后，滚动回风琴项位置（置顶）
            setTimeout(() => {
                const element = document.getElementById(`power-${index}`);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 350);
        }

        // 显示二维码弹窗
        function showQRModal() {
            document.getElementById('qrModal').style.display = 'flex';
        }

        // 隐藏二维码弹窗
        function hideQRModal() {
            document.getElementById('qrModal').style.display = 'none';
        }

        // 初始化粒子动画
        function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const width = canvas.parentElement.offsetWidth;
            const height = canvas.parentElement.offsetHeight;
            canvas.width = width;
            canvas.height = height;
            
            const PARTICLE_COUNT = 8;
            const MAX_DIST = 120;
            const particles = [];
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.6,
                    vy: (Math.random() - 0.5) * 0.6,
                    radius: Math.random() * 2 + 2,
                });
            }
            
            const draw = () => {
                ctx.clearRect(0, 0, width, height);
                
                // 更新粒子位置
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > width) p.vx = -p.vx;
                    if (p.y < 0 || p.y > height) p.vy = -p.vy;
                });
                
                // 绘制连线
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < MAX_DIST) {
                            const alpha = (1 - dist / MAX_DIST) * 0.35;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                }
                
                // 绘制粒子
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(100, 160, 220, 0.6)';
                    ctx.fill();
                });
                
                requestAnimationFrame(draw);
            };
            
            draw();
        }
    </script>
</body>
